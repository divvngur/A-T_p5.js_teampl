steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/pigeon-game:$SHORT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/pigeon-game:$SHORT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy pigeon-game \
          --image gcr.io/$PROJECT_ID/pigeon-game:$SHORT_SHA \
          --platform managed \
          --region asia-northeast3 \
          --allow-unauthenticated \
          --port 3000

images:
  - 'gcr.io/$PROJECT_ID/pigeon-game:$SHORT_SHA'
