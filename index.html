<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>입벌려! 비둘기 똥 들어간다~</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles/global.css" />
</head>
<body>
  <div id="app">
    <div id="intro-screen"       class="screen"></div>
    <div id="main-screen"        class="screen"></div>
    <div id="login-screen"       class="screen"></div>
    <div id="loading-screen"     class="screen"></div>
    <div id="stage-select-screen" class="screen"></div>
    <div id="result-screen"      class="screen"></div>
    <div id="game-screen"        class="screen">
      <div id="game-hud" style="display:none;">
        <div id="hud-hearts"></div>
        <div id="hud-center"></div>
        <div id="hud-right">
          <button id="btn-pause" aria-label="일시정지">⏸</button>
          <button id="btn-quit" aria-label="게임 종료">✕</button>
        </div>
      </div>
      <div id="pause-overlay" style="display:none;">
        <div class="pause-box">
          <div class="pause-title">⏸ 일시정지</div>
          <button id="btn-resume">▶ 재개</button>
          <button id="btn-quit-confirm">🚪 게임 종료</button>
        </div>
      </div>
      
    </div>
    <div id="leaderboard-screen" class="screen"></div>
    <div id="ending-screen"      class="screen"></div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" style="display:none;">
    <div id="modal-box">
      <div id="modal-msg"></div>
      <div id="modal-btns"></div>
    </div>
  </div>

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <!-- ml5.js -->
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <!-- MediaPipe Selfie Segmentation -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Game Source -->
  <script src="src/game/StageConfig.js"></script>
  <script src="src/game/HDFaceGame.js"></script>
  <script src="src/screens/IntroScreen.js"></script>
  <script src="src/screens/MainScreen.js"></script>
  <script src="src/screens/LoginScreen.js"></script>
  <script src="src/screens/LoadingScreen.js"></script>
  <script src="src/screens/StageSelectScreen.js"></script>
  <script src="src/screens/GameScreen.js"></script>
  <script src="src/screens/ResultScreen.js"></script>
  <script src="src/screens/LeaderboardScreen.js"></script>
  <script src="src/screens/EndingScreen.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
